<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stuart One Roadmap</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header class="topbar focus-topbar">
    <div>
      <p class="eyebrow">One Roadmap</p>
      <h1>Stuart Crowley Operating Roadmap</h1>
      <p class="subtitle">One task at a time. Complete it, park it, or kill it. Then move on.</p>
    </div>
    <div class="status-card">
      <span>Current sprint</span>
      <strong id="activeSprintName">Loading</strong>
      <small id="queueStatus">Loading queue</small>
    </div>
  </header>

  <main class="focus-shell">
    <section id="focusTask" class="focus-task"></section>
    <aside id="sidePanel" class="side-panel"></aside>
  </main>

  <div id="toast" class="toast" hidden></div>
  <script src="assets/js/app.js"></script>
</body>
</html>
